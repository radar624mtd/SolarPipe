# flux_rope_propagation_v1
#
# Two-stage CME transit time pipeline:
#   Stage 1: DragBased physics baseline — Dormand-Prince ODE, GSM-frame Bz (RULE-030, RULE-031)
#   Stage 2: FastForest residual correction — trained on (observed - physics) residuals
#
# Mock data strategy: residual_calibration (RULE-053)
#   ENLIL synthetic data is used ONLY for events strictly before the test period.
#
# Evaluation: expanding-window temporal CV, 5 folds, 5-day gap buffer (RULE-051)

name: flux_rope_propagation_v1

data_sources:
  cme_catalog:
    provider: sqlite
    # Phase 6 output — produced by: cd data && python -m solarpipe_data crossmatch && export-sqlite
    connection_string: "Data Source=data/data/output/cme_catalog.db"
    options:
      table: training_features   # flat JOIN view: cme_events + l1_arrivals + flux_rope_fits
      # sentinel values (9999.9, -1e31) converted to NaN at load time (RULE-120)

  enlil_ensemble:
    provider: parquet
    # Phase 6 output — produced by: python -m solarpipe_data export-parquet
    connection_string: data/data/output/enlil_runs/enlil_ensemble_v1.parquet
    # Row groups ≤64 MB; safe disposal via using (RULE-050, ADR-005)

stages:
  drag_baseline:
    framework: Physics
    model_type: DragBased
    data_source: cme_catalog
    features:
      - cme_speed_kms          # coronagraph plane-of-sky speed (km/s)
    target: transit_time_hours
    hyperparameters:
      # Drag parameter γ (cm^-1) — O'Brien & McPherron 2000 central value
      drag_parameter: 0.2e-7
      # Background solar wind speed (km/s) — use sw_speed_ambient_kms from catalog if available
      background_speed_km_s: 400.0
      # Integration start/stop radii (solar radii)
      r_start_rs: 21.5
      r_stop_rs: 215.0

  rf_correction:
    framework: MlNet
    model_type: FastForest
    data_source: cme_catalog
    features:
      - cme_speed_kms           # coronagraph speed (km/s)
      - bz_gsm_proxy_nt         # Dst-proxy Bz min (nT); real in-situ fit deferred (flux_rope_fits.observed_rotation_angle)
      - sw_density_n_cc         # ambient solar wind proton density (n/cc)
      - sw_speed_ambient_kms    # ambient solar wind speed at L1 (km/s)
      - delta_v_kms             # computed: cme_speed_kms - sw_speed_ambient_kms (drag differential)
      - sw_bt_nt                # total interplanetary magnetic field magnitude (nT)
      - speed_ratio             # computed: cme_speed_kms / sw_speed_ambient_kms (dimensionless)
      - speed_x_bz              # interaction: cme_speed_kms * bz_gsm_proxy_nt (speed×field coupling)
      - speed_x_density          # interaction: cme_speed_kms * sw_density_n_cc (momentum flux proxy)
      # f10_7 excluded: all 2012 rows have NULL in current catalog (Phase 6 deferred)
    target: transit_time_hours
    mock_data_strategy: residual_calibration
    hyperparameters:
      number_of_trees: 100
      number_of_leaves: 20
      # RULE-010: FeatureFraction must be set explicitly (never rely on default)
      feature_fraction: 0.7
      minimum_example_count_per_leaf: 5
      learning_rate: 0.2

compose: drag_baseline ^ rf_correction

evaluation:
  strategy: expanding_window
  gap_days: 5

output:
  format: json
  path: output/flux_rope_propagation_v1_predictions.json
