name: flux_rope_propagation_v2
# Generated by Phase 7 hypothesis sweep. Winner: H1
# Generated: 2026-04-10T02:59:01.3956059Z

data_sources:
  cme_events:
    provider: sqlite
    connection_string: data/cme_catalog.db
    options:
      table: cme_events

stages:
  drag_baseline:
    framework: Physics
    model_type: DragBased
    data_source: cme_events
    features: [cme_speed_kms, sw_speed_ambient_kms]
    target: transit_time_hours
    hyperparameters:
      drag_parameter: 0.2e-7
      background_speed_km_s: 400
      r_start_rs: 21.5
      r_stop_rs: 215.0
      solver: dormand_prince
  rf_correction:
    framework: MlNet
    model_type: FastForest
    data_source: cme_events
    features: [cme_speed_kms, bz_gsm_proxy_nt, sw_density_n_cc, sw_speed_ambient_kms, delta_v_kms, sw_bt_nt, speed_ratio, speed_x_bz, speed_x_density]
    target: transit_time_hours
    hyperparameters:
      number_of_trees: 100
      number_of_leaves: 20
      feature_fraction: 0.7

compose: "drag_baseline ^ rf_correction"
