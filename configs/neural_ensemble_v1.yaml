# neural_ensemble_v1
#
# Two-headed neural ensemble for CME transit time prediction.
# Target: MAE <= 3h +/- 2h on the 90-event holdout (split='holdout').
#
# Architecture (see docs/NEURAL_ENSEMBLE_PLAN.md, ADR-NE-001):
#   Stage 1: TFT+PINN sidecar — trains flat encoder (105 features + masks)
#             + sequence encoder (222 timesteps x 20 OMNI channels + masks)
#             + quantile head (P10/P50/P90). Physics losses active (G4 ✅ 2748bbe).
#             lambda_bound=0.1 + lambda_qorder=0.5 on from epoch 0.
#             lambda_ode/lambda_mono=0.0 warm-start; enable post-convergence.
#   Stage 2: ONNX inference — loaded from registry after sidecar export (G5 ✅).
#
# Data contract (see python/feature_schema.py — NEVER bypass):
#   table: training_features  (133-col SQLite VIEW in staging.db)
#   filter: split IS NOT NULL AND exclude = 0
#   flat features: 105 columns (6 phantom cols auto-dropped by loader)
#   sequence: data/sequences/{split}_sequences.parquet — 222 x 20 per event
#   label: transit_time_hours
#
# Null handling (ADR-NE-002):
#   Dense cols (<10% NULL): impute column mean; mask always 1.
#   Sparse cols (10-95% NULL): impute 0.0, mask=0; learnable null embedding.
#   Phantom cols (100% NULL): dropped at load — not passed to model.
#
# RULE-206: train/holdout split (1884/90) must be preserved exactly.
# Use filter: split IS NOT NULL to exclude the 7444 non-event rows in the VIEW.

name: neural_ensemble_v1

data_sources:
  # NOTE: sequence Parquet is loaded on the Python sidecar side using the
  # `sequences_path` hyperparameter (see stage below) and re-used by the
  # OnnxAdapter at inference time. It is deliberately not a declared
  # data_source because the C# frame-loader layer flattens long-form sequences.
  training_features:
    provider: sqlite
    connection_string: "Data Source=data/data/staging/staging.db"
    options:
      table: training_features
      filter: "split IS NOT NULL AND exclude = 0"
      # sentinel conversion: 9999.9 and -1e31 -> NaN at load time (RULE-204)

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: TFT + PINN training via Python gRPC sidecar
  # ---------------------------------------------------------------------------
  tft_pinn_encoder:
    framework: python_grpc
    model_type: TftPinn
    data_source: training_features

    # Flat feature columns — all 105 from feature_schema.FLAT_COLS
    # Phantom cols (dimming_area, dimming_asymmetry, eit_wave_speed_kms,
    # rc_bz_min, phase8_pred_transit_hours, pinn_v1_pred_transit_hours)
    # are dropped automatically by the loader — do NOT list them here.
    features:
      # --- Tier 0: CME kinematics ---
      - cme_speed_kms
      - cme_half_angle_deg
      - cme_latitude
      - cme_longitude
      - cme_mass_grams
      - cme_angular_width_deg
      - cme_tilt_angle_deg
      # --- Tier 0: CDAW 2nd-order kinematics ---
      - cdaw_linear_speed_kms
      - cdaw_angular_width_deg
      - cdaw_mass_log10
      - cdaw_ke_log10
      - cdaw_matched
      - cdaw_mass_quality
      - second_order_speed_init
      - second_order_speed_final
      - second_order_speed_20Rs
      - accel_kms2
      - mpa_deg
      # --- Tier 0: SHARP magnetic keywords ---
      - usflux
      - meangam
      - meangbt
      - meangbz
      - meangbh
      - meanjzd
      - totusjz
      - meanjzh
      - totusjh
      - absnjzh
      - meanalp
      - savncpp
      - meanpot
      - totpot
      - meanshr
      - shrgt45
      - r_value
      - area_acr
      - sharp_available
      # --- Tier 0: ambient solar wind ---
      - sw_speed_ambient
      - sw_density_ambient
      - sw_bt_ambient
      - sw_bz_ambient
      - delta_v_kms
      # --- Tier 0: OMNI 24h pre-launch ---
      - omni_24h_bz_mean
      - omni_24h_bz_std
      - omni_24h_bz_min
      - omni_24h_speed_mean
      - omni_24h_density_mean
      - omni_24h_pressure_mean
      - omni_24h_ae_max
      - omni_24h_dst_min
      - omni_24h_kp_max
      # --- Tier 0: OMNI 48h pre-launch ---
      - omni_48h_density_spike_max
      - omni_48h_speed_gradient
      # --- Tier 0: OMNI 150h pre-launch ---
      - omni_150h_density_median
      - omni_150h_speed_median
      # --- Tier 0: space weather indices ---
      - f10_7
      - sunspot_number
      - dst_min_nt
      - kp_max
      - storm_threshold_met
      # --- Tier 0: flares ---
      - flare_class_numeric
      - has_flare
      - flare_source_longitude
      - goes_peak_flux_wm2
      # --- Tier 0: HCS tilt ---
      - hcs_tilt_angle
      - hcs_distance
      - hcs_tilt_classic_deg
      - hcs_tilt_radial_deg
      # --- Tier 0: Type II radio ---
      - has_type2_burst
      - type2_start_freq_mhz
      - type2_end_freq_mhz
      # --- Tier 0: ENLIL ---
      - enlil_predicted_arrival_hours
      - enlil_au
      - enlil_matched
      # --- Tier 0: multi-CME context ---
      - preceding_cme_count_48h
      - preceding_cme_speed_max
      - preceding_cme_speed_mean
      - preceding_cme_angular_sep_min
      - is_multi_cme
      # --- Tier 0: clustering ---
      - cluster_id_k5
      - cluster_id_k8
      - cluster_id_k12
      - cluster_id_dbscan
      - cluster_assigned
      # --- Tier 1: R&C ICME ---
      - rc_icme_type
      - rc_bde_flag
      - rc_v_icme
      - rc_b_max
      - rc_matched
      # --- Tier 1: HEK flags ---
      - has_coronal_dimming
      - has_eit_wave
      - has_filament_eruption
      - has_sigmoid
      # --- Tier 1: DONKI SEP ---
      - has_sep
      - sep_onset_delay_hours
      # --- Tier 1: PFSS ---
      - pfss_field_type
      - pfss_open_fraction_10deg
      - pfss_ch_distance_deg
      - pfss_polarity
      # --- Tier 2: DONKI MPC ---
      - has_mpc
      - mpc_delay_hours
      # --- Tier 2: STEREO-A ---
      - stereo_available
      - stereo_speed_ambient
      - stereo_density_ambient
      - stereo_lead_hours

    target: transit_time_hours

    hyperparameters:
      # --- Model architecture ---
      flat_hidden_dim: 256        # MLP hidden size for flat encoder
      flat_n_residual_blocks: 2   # residual blocks in flat encoder
      seq_hidden_dim: 128         # TFT hidden size (d_model)
      seq_n_heads: 4              # multi-head attention heads
      seq_n_layers: 2             # TFT encoder layers
      seq_dropout: 0.1
      null_embedding_dim: 16      # learnable null embedding per sparse column
      quantiles: [0.1, 0.5, 0.9] # P10/P50/P90

      # --- Training ---
      # lr reduced 1e-3 -> 3e-4: G7 run1 showed high val oscillation (±1.0 loss)
      # at 1e-3; 3e-4 should settle into the sub-5.85 floor observed at epoch 70.
      # Cosine annealing decay: lr -> lr/100 over T_max=max_epochs.
      learning_rate: 3.0e-4
      batch_size: 64
      max_epochs: 1000
      early_stopping_patience: 75
      gradient_clip_norm: 1.0
      seed: 42
      device: "cuda"            # Quadro M4000 (sm_52, 8 GB) — RULE-300 MatMul surgery at export

      # --- Physics loss weights (G4 — fully wired, commit 2748bbe) ---
      # lambda_ode / lambda_mono intentionally 0.0 for G7 warm-start: ODE residual
      # adds gradient noise before P50 converges; enable once MAE < 15h.
      lambda_ode: 0.0       # drag ODE residual (warm-start off; enable post-convergence)
      lambda_mono: 0.0      # monotonic decay hinge (warm-start off; enable post-convergence)
      lambda_bound: 0.1     # transit time physical bounds [12h, 120h] — ACTIVE
      lambda_qorder: 0.5    # quantile ordering consistency — ACTIVE

      # --- Physics ODE parameters (for drag residual loss) ---
      # gamma0 is in km^-1 to match DragBasedModel.cs / ProgressiveDragPropagator.cs.
      # DragBasedModel default is 0.5e-7; clamped internally to [1e-9, 1e-6] km^-1.
      drag_gamma_km_inv: 0.5e-7  # baseline drag coefficient (km^-1)
      v_sw_ref_kms: 400.0        # reference solar wind speed (km/s)
      n_ref_cm3: 5.0             # reference proton density for gamma_eff scaling

      # --- Feature flag: use TFT+PINN vs old LSTM stub ---
      use_tft_pinn: "true"      # sidecar reads string "true"/"false" (see _dispatch_train)

      # --- Sequence Parquet path (RULE-213 compatible, SuperMAG expansion hook) ---
      # Sidecar reads `{sequences_path}/{split}_sequences.parquet` per event and
      # joins on activity_id to reconstruct the (B, 222, 20) tensor.
      sequences_path: "C:/Users/radar/SolarPipe/data/sequences"
      split: "train"            # used for the training pass; predict stage overrides to "holdout"
      timeout_minutes: 20       # CUDA: 500 epochs * ~1.5s = ~12 min; 20 min gives headroom

  # ---------------------------------------------------------------------------
  # Stage 2: ONNX inference (G6 round-trip)
  # ---------------------------------------------------------------------------
  # After Stage 1 completes the sidecar writes `{stage}/model.pt` + meta.json.
  # The host then calls ExportOnnx (opset ≤ 20) to produce the named-I/O graph:
  #   inputs : x_flat (B, 105), m_flat (B, 105), x_seq (B, 222, 20), m_seq (B, 222, 20)
  #   outputs: p10 (B, 1), p50 (B, 1), p90 (B, 1)
  # OnnxAdapter.TftPinn mode loads this graph and reconstructs x_seq/m_seq by
  # reading {sequences_path}/{split}_sequences.parquet keyed on activity_id.
  tft_pinn_inference:
    framework: onnx
    model_type: TftPinn
    data_source: training_features
    features:
      # Same 105 flat columns as Stage 1 — OnnxAdapter builds x_flat/m_flat
      # from these columns; m_flat is derived from NaN presence automatically.
      - cme_speed_kms
      - cme_half_angle_deg
      - cme_latitude
      - cme_longitude
      - cme_mass_grams
      - cme_angular_width_deg
      - cme_tilt_angle_deg
      - cdaw_linear_speed_kms
      - cdaw_angular_width_deg
      - cdaw_mass_log10
      - cdaw_ke_log10
      - cdaw_matched
      - cdaw_mass_quality
      - second_order_speed_init
      - second_order_speed_final
      - second_order_speed_20Rs
      - accel_kms2
      - mpa_deg
      - usflux
      - meangam
      - meangbt
      - meangbz
      - meangbh
      - meanjzd
      - totusjz
      - meanjzh
      - totusjh
      - absnjzh
      - meanalp
      - savncpp
      - meanpot
      - totpot
      - meanshr
      - shrgt45
      - r_value
      - area_acr
      - sharp_available
      - sw_speed_ambient
      - sw_density_ambient
      - sw_bt_ambient
      - sw_bz_ambient
      - delta_v_kms
      - omni_24h_bz_mean
      - omni_24h_bz_std
      - omni_24h_bz_min
      - omni_24h_speed_mean
      - omni_24h_density_mean
      - omni_24h_pressure_mean
      - omni_24h_ae_max
      - omni_24h_dst_min
      - omni_24h_kp_max
      - omni_48h_density_spike_max
      - omni_48h_speed_gradient
      - omni_150h_density_median
      - omni_150h_speed_median
      - f10_7
      - sunspot_number
      - dst_min_nt
      - kp_max
      - storm_threshold_met
      - flare_class_numeric
      - has_flare
      - flare_source_longitude
      - goes_peak_flux_wm2
      - hcs_tilt_angle
      - hcs_distance
      - hcs_tilt_classic_deg
      - hcs_tilt_radial_deg
      - has_type2_burst
      - type2_start_freq_mhz
      - type2_end_freq_mhz
      - enlil_predicted_arrival_hours
      - enlil_au
      - enlil_matched
      - preceding_cme_count_48h
      - preceding_cme_speed_max
      - preceding_cme_speed_mean
      - preceding_cme_angular_sep_min
      - is_multi_cme
      - cluster_id_k5
      - cluster_id_k8
      - cluster_id_k12
      - cluster_id_dbscan
      - cluster_assigned
      - rc_icme_type
      - rc_bde_flag
      - rc_v_icme
      - rc_b_max
      - rc_matched
      - has_coronal_dimming
      - has_eit_wave
      - has_filament_eruption
      - has_sigmoid
      - has_sep
      - sep_onset_delay_hours
      - pfss_field_type
      - pfss_open_fraction_10deg
      - pfss_ch_distance_deg
      - pfss_polarity
      - has_mpc
      - mpc_delay_hours
      - stereo_available
      - stereo_speed_ambient
      - stereo_density_ambient
      - stereo_lead_hours
    target: transit_time_hours
    hyperparameters:
      # `model_path` is populated after the sidecar ExportOnnx call (G6 wiring).
      # Keep as a relative path under SOLARPIPE_REGISTRY for portability.
      # RULE-300: point at the MatMul-surgery variant, not raw model.onnx.
      model_path: "C:/Users/radar/SolarPipe/models/tft_pinn_aa409d9d/model_matmul_reduce.onnx"
      sequences_path: "C:/Users/radar/SolarPipe/data/sequences"
      split: "holdout"          # inference runs against the 90-event holdout
      use_cuda_ep: "true"       # RULE-300: CUDA EP via ORT; requires MatMul-surgery ONNX

# Evaluation: YamlDotNet schema accepts `strategy` + `gap_days` only.
# Rich quality-gate / metrics spec is deferred to G7 (see NEURAL_ENSEMBLE_PLAN §G7).
# Desired G7 policy (not yet enforced by schema):
#   method: temporal_cv, n_folds: 5, calibration_fold: last (RULE-164)
#   metrics: [mae, rmse, bias, pinball_p10/50/90, quantile_coverage]
#   quality_gate: { metric: mae, split: holdout, threshold: 6.0, on_failure: abort }
evaluation:
  strategy: expanding_window
  gap_days: 5                    # RULE-051 temporal gap buffer

output:
  format: json
  path: "output/neural_ensemble_v1/"
